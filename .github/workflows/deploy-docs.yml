name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Copy docs to docs/ folder
        run: |
          mkdir -p docs
          cp README.md docs/index.md
          cp PRD.md ARCHITECTURE.md API_CONTRACTS.md DATA_MODEL.md docs/
          cp PROMPTING_EVALS.md MODEL_PROVIDER_NOTES.md SECURITY_PRIVACY_COMPLIANCE.md docs/
          cp OPS_RUNBOOK.md DECISIONS.md CONTRIBUTORS.md docs/

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
