site_name: AI Visibility SaaS — Docs
site_url: https://adityasingh7402.github.io/AI-Visibility-SaaS/
site_description: Documentation for AI Visibility SaaS — track and improve your brand's presence across AI-powered search engines and LLM responses.
site_author: Aditya Singh

repo_url: https://github.com/adityasingh7402/AI-Visibility-SaaS
repo_name: adityasingh7402/AI-Visibility-SaaS
edit_uri: edit/main/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/adityasingh7402

nav:
  - Home: index.md
  - PRD: PRD.md
  - Architecture: ARCHITECTURE.md
  - API Contracts: API_CONTRACTS.md
  - Data Model: DATA_MODEL.md
  - Prompting & Evals: PROMPTING_EVALS.md
  - AI Providers: MODEL_PROVIDER_NOTES.md
  - Security: SECURITY_PRIVACY_COMPLIANCE.md
  - Ops Runbook: OPS_RUNBOOK.md
  - Decisions: DECISIONS.md
  - Team: CONTRIBUTORS.md

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - def_list
